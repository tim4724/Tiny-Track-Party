<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="app-version" content="__APP_VERSION__" />
  <title>Tiny Track Party</title>
  <link rel="icon" href="data:," />
  <link rel="preload" as="font" type="font/woff2" href="/assets/fonts/fredoka-variable.woff2" crossorigin />
  <link rel="preload" as="font" type="font/woff2" href="/assets/fonts/nunito-variable.woff2" crossorigin />
  <!-- Three.js (vendored). The inline importmap is the one script needing a CSP
       nonce; the module entry is external so it's covered by 'self'. It precedes
       the modulepreloads below so their bare `three` specifier (in GLTFLoader)
       resolves at preload time. -->
  <script type="importmap" nonce="__CSP_NONCE__">
  {
    "imports": {
      "three": "/vendor/three/three.module.js",
      "three/addons/": "/vendor/three/addons/"
    }
  }
  </script>

  <!-- Preload the heavy render deps up front. three.module.js statically pulls
       in the larger three.core.js, and SceneRenderer always needs GLTFLoader to
       place the track/cars — both are otherwise discovered only deep in the
       module graph (modulepreload doesn't follow a module's own imports). -->
  <link rel="modulepreload" href="/vendor/three/three.core.js" />
  <link rel="modulepreload" href="/vendor/three/three.module.js" />
  <link rel="modulepreload" href="/vendor/three/addons/loaders/GLTFLoader.js" />
  <link rel="stylesheet" href="/shared/theme.css?v=__APP_V__" />
  <link rel="stylesheet" href="/display/display.css?v=__APP_V__" />

  <!-- Transport + shared contract: classic scripts set window globals BEFORE
       the deferred module entry runs. -->
  <script src="/shared/protocol.js?v=__APP_V__"></script>
  <script src="/partyplug/PartyConnection.js?v=__APP_V__"></script>
  <script src="/partyplug/RoomFlow.js?v=__APP_V__"></script>
  <script src="/partyplug/PartyFastlane.js?v=__APP_V__"></script>
</head>
<body>
  <!-- Default lobby backdrop: the sunny diorama (shown until a track is picked).
       Once the host picks a track, the 3D #scene below covers it with the live
       orbiting preview. (Decorative; see .scene in /shared/theme.css.) -->
  <div class="scene" id="lobby-diorama" aria-hidden="true">
    <div class="scene__sky"></div>
    <div class="scene__sun"></div>
    <div class="scene__cloud scene__cloud--a"></div>
    <div class="scene__cloud scene__cloud--b"></div>
    <div class="scene__grass"></div>
  </div>

  <!-- Persistent 3D backdrop. In the lobby it slowly orbits the SELECTED track
       (the live preview); in a race it draws the split-screen world. Hidden until
       a track is picked (then it covers the diorama). The lobby + race sections
       layer on top of it. -->
  <div id="scene" class="hidden"></div>

  <!-- Crossfade veil for the lobby track preview: a sky-coloured layer (matching the
       3D scene's clear colour) that dips opaque to hide a track swap / demo rebuild,
       then fades back. Sits above #scene but below the lobby UI + race overlay, so
       only the backdrop fades. Toggled (.is-on) by main.js's fadeBackdrop(). -->
  <div id="scene-fade" aria-hidden="true"></div>

  <!-- Lobby -->
  <section id="lobby">
    <div class="lobby__left card">
      <h1>Tiny Track <span>Party</span></h1>
      <div class="join">
        <button type="button" class="join__at" id="joinbox" aria-label="Copy join link">
          <div class="join__label">Join at</div>
          <div class="join__url" id="joinurl">…</div>
        </button>
      </div>
      <div id="count">Scan the QR code to join</div>
      <!-- Seeded with four open-seat placeholders so the welcome card paints at its
           full height on the first frame, before main.js runs. lobbySeats.js's
           renderSeats() then replaces these (always keeping >=4 seats) as players
           join — keep this markup in sync with its `seat--open` branch. -->
      <div id="players">
        <div class="seat seat--open"><div class="seat__open"></div><div class="seat__name"><span class="seat__label">Open</span></div></div>
        <div class="seat seat--open"><div class="seat__open"></div><div class="seat__name"><span class="seat__label">Open</span></div></div>
        <div class="seat seat--open"><div class="seat__open"></div><div class="seat__name"><span class="seat__label">Open</span></div></div>
        <div class="seat seat--open"><div class="seat__open"></div><div class="seat__name"><span class="seat__label">Open</span></div></div>
      </div>
    </div>
    <div class="lobby__right">
      <div class="qr-card"><canvas id="qr"></canvas></div>
    </div>

    <!-- Build badge: version + short commit, shown on preview (non-production)
         builds only. The server fills __VERSION_BADGE__ with "x.y.z (#sha)" off
         production and leaves it empty in prod; .version-badge:empty hides it.
         Lives inside #lobby so it's gone once the race starts. -->
    <div class="version-badge" aria-label="Build version">__VERSION_BADGE__</div>
  </section>

  <!-- Race: overlays over the persistent #scene backdrop -->
  <section id="race" class="hidden">
    <button id="pause-btn" class="icon-btn hidden" aria-label="Pause"><span class="pause-glyph"></span></button>
    <div id="countdown"></div>
    <!-- Pause overlay — frosted glass over the frozen race -->
    <div id="pause-overlay" class="hidden">
      <div class="pause-card card">
        <h2>Paused</h2>
        <div class="pause-card__btns">
          <button id="pause-continue" class="btn btn--brand">Continue</button>
          <button id="pause-newgame" class="btn btn--ghost">New game</button>
        </div>
      </div>
    </div>
    <div id="results" class="hidden">
      <h2>Results</h2>
      <ol id="results-list"></ol>
      <button id="results-newgame" class="btn btn--brand">New Game</button>
    </div>
  </section>

  <!-- Transient "Copied" confirmation, shown when the join box is clicked. -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <!-- Audio-unlock hint: browsers keep a page muted until a real click/key on
       it, so this pill shows while sound is still locked (lobby and race
       alike). Any gesture unlocks; clicking the pill is the obvious one. -->
  <button id="sound-hint" class="sound-hint hidden">🔇 tap for sound</button>

  <script type="module" src="/display/main.js?v=__APP_V__"></script>
</body>
</html>

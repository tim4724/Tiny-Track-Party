<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Track Gallery — Tiny Track Party</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="/gallery.css?v=__APP_V__">
</head>
<body>
<header>
  <h1>TINY TRACK · TRACKS</h1>

  <div class="group">
    <select id="display-ar">
      <option value="16x9" selected>AR 16:9</option>
      <option value="21x9">AR 21:9</option>
      <option value="4x3">AR 4:3</option>
      <option value="1x1">AR 1:1</option>
    </select>
  </div>

  <div class="group">
    <label class="checkbox-label" for="show-centerline">
      <input type="checkbox" id="show-centerline">
      Centerline
    </label>
  </div>

  <div class="group">
    <select id="cards-per-row">
      <option value="1">1 column</option>
      <option value="2" selected>2 columns</option>
      <option value="3">3 columns</option>
      <option value="4">4 columns</option>
    </select>
  </div>

  <button class="ctrl options-toggle" id="options-toggle" aria-expanded="false" aria-label="Options">⚙</button>

  <nav>
    <a href="/gallery.html">Display</a>
    <a href="/gallery-controller.html">Phone</a>
    <a href="/gallery-tracks.html" class="active">Tracks</a>
    <a href="/assets-viewer.html">Assets</a>
  </nav>
</header>

<section class="rail">
  <div id="track-rows"></div>
</section>

<script src="/gallery-common.js"></script>
<script type="module" src="/gallery-tracks.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="app-version" content="__APP_VERSION__" />
  <title>Tiny Track Party Controller</title>
  <link rel="icon" href="data:," />
  <link rel="preload" as="font" type="font/woff2" href="/assets/fonts/fredoka-variable.woff2" crossorigin />
  <link rel="preload" as="font" type="font/woff2" href="/assets/fonts/nunito-variable.woff2" crossorigin />
  <link rel="stylesheet" href="/shared/theme.css?v=__APP_V__" />
  <link rel="stylesheet" href="/controller/controller.css?v=__APP_V__" />
  <script src="/shared/protocol.js?v=__APP_V__"></script>
  <script src="/partyplug/PartyConnection.js?v=__APP_V__"></script>
  <script src="/partyplug/PartyFastlane.js?v=__APP_V__"></script>
</head>
<body>
  <!-- Name -->
  <section id="name">
    <h1>Tiny Track <span>Party</span></h1>
    <p class="sub">Pick a name and jump in.</p>
    <form id="name-form">
      <input id="name-input" type="text" placeholder="Your name" maxlength="16" autocomplete="off" />
      <button id="join-btn" type="submit" class="btn btn--brand">Join race</button>
    </form>
    <div id="name-status"></div>
  </section>

  <!-- Lobby — pick your car (the shared display owns the player roster) -->
  <section id="lobby" class="hidden">
    <h2 class="lobby-title">Choose your car</h2>
    <div id="carpick" class="carpick"></div>
    <button id="start-btn" class="btn btn--brand hidden">Start race</button>
    <div id="wait-host" class="hidden">Waiting for the host to start…</div>
  </section>

  <!-- Game: tilt to steer, hold BRAKE to slow -->
  <section id="game" class="hidden">
    <div id="go" class="hidden"></div>
    <button id="pause-btn" class="icon-btn hidden" aria-label="Pause"><span class="pause-glyph"></span></button>
    <div id="drive-hud" class="hidden">
      <div class="hud-top">
        <div id="lap">Lap 1/3</div>
        <div id="pos">P1</div>
      </div>
      <div class="steer">
        <div class="steer__track"><div id="steer-fill"></div></div>
        <div class="steer__label">tilt to steer</div>
      </div>
      <button id="brake-btn" class="brake">BRAKE</button>
      <div id="motion-tip" class="hidden">No tilt? Use ◄ ► keys to steer.</div>
    </div>
    <!-- Pause overlay — frosted glass with the same choices as the big screen -->
    <div id="pause-overlay" class="hidden">
      <h2>Paused</h2>
      <button id="pause-continue" class="btn btn--brand">Continue</button>
      <button id="pause-newgame" class="btn btn--ghost">New game</button>
    </div>
  </section>

  <!-- Latency chip — one-way (RTT/2), pinned bottom-right across all screens.
       Hidden until the first reading lands (post-join). The bolt shows only
       while the input/ping path is on the P2P fastlane DataChannel. -->
  <div id="latency" class="latency hidden" role="status" aria-live="off">
    <span class="latency__bolt" aria-hidden="true"></span><span class="latency__text">-- ms</span>
  </div>

  <script type="module" src="/controller/main.js?v=__APP_V__"></script>
</body>
</html>

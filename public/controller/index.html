<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="app-version" content="__APP_VERSION__" />
  <title>Tiny Track Party Controller</title>
  <link rel="icon" href="data:," />
  <link rel="preload" as="font" type="font/woff2" href="/assets/fonts/fredoka-variable.woff2" crossorigin />
  <link rel="preload" as="font" type="font/woff2" href="/assets/fonts/nunito-variable.woff2" crossorigin />
  <link rel="stylesheet" href="/shared/theme.css?v=__APP_V__" />
  <link rel="stylesheet" href="/controller/controller.css?v=__APP_V__" />
  <script src="/shared/protocol.js?v=__APP_V__"></script>
  <script src="/partyplug/PartyConnection.js?v=__APP_V__"></script>
  <script src="/partyplug/PartyFastlane.js?v=__APP_V__"></script>
</head>
<body>
  <!-- Name -->
  <section id="name">
    <h1>Tiny Track <span>Party</span></h1>
    <p class="sub">Pick a name and jump in.</p>
    <form id="name-form">
      <input id="name-input" type="text" placeholder="Your name" maxlength="16" autocomplete="off" />
      <button id="join-btn" type="submit" class="btn btn--brand">Join race</button>
    </form>
    <div id="name-status"></div>
  </section>

  <!-- Lobby — who you are, your car, the track (the shared display owns the
       player roster). -->
  <section id="lobby" class="hidden">
    <!-- your identity, up top — name in your livery colour (no dot needed) -->
    <div class="lobby-me">
      <span id="me-name" class="lobby-me__name"></span>
    </div>

    <!-- your car -->
    <div class="lobby-head"><span class="pill">Car</span></div>
    <div id="car-hero" class="car-hero"></div>
    <div id="carpick" class="carpick"></div>

    <!-- the track — host only: schematic maps from the display's catalog.
         Everyone else sees the pick on the big screen instead. Hidden until the
         catalog arrives (WELCOME); see renderTrackPicker. -->
    <div id="trackpick" class="trackpick hidden">
      <div class="lobby-head"><span class="pill">Track</span></div>
      <div id="track-strip" class="trackpick__strip"></div>
    </div>

    <!-- lobby footer — non-hosts ready up; the host's button is "Start race",
         disabled until everyone else is ready. See renderReadyFoot (ui.js). -->
    <button id="ready-btn" class="btn btn--brand hidden">I’m ready</button>
    <div id="ready-note" class="hidden"></div>
  </section>

  <!-- Game: tilt to steer, hold BRAKE to slow -->
  <section id="game" class="hidden">
    <button id="pause-btn" class="icon-btn hidden" aria-label="Pause"><span class="pause-glyph"></span></button>
    <div id="drive-hud" class="hidden">
      <div class="hud-top">
        <div id="hud-name" class="hud-name"></div>
        <div class="hud-rank">
          <div id="pos" class="hud-rank__place">1st</div>
          <div id="lap" class="hud-rank__lap">Lap 1/3</div>
        </div>
      </div>
      <div class="steer">
        <div class="steer__track"><div id="steer-fill"></div></div>
        <div class="steer__label">tilt to steer</div>
      </div>
      <div class="drive-controls">
        <button id="action-btn" class="action" disabled aria-label="Use item">ITEM</button>
        <button id="brake-btn" class="brake">BRAKE</button>
      </div>
      <div id="motion-tip" class="hidden">No tilt? Use ◄ ► keys to steer.</div>
    </div>
    <!-- Pause overlay — frosted glass with the same choices as the big screen -->
    <div id="pause-overlay" class="hidden">
      <h2>Paused</h2>
      <button id="pause-continue" class="btn btn--brand">Continue</button>
      <button id="pause-newgame" class="btn btn--ghost">New game</button>
    </div>
  </section>

  <!-- Results — shown once your car finishes; the board fills in as the rest of
       the field crosses the line. The host starts the next game from here. -->
  <section id="results" class="hidden">
    <h2 class="results-title">Results</h2>
    <ol id="result-list" class="result-list"></ol>
    <div id="result-foot">
      <button id="newgame-btn" class="btn btn--brand hidden">New game</button>
      <div id="result-wait" class="result-wait hidden"></div>
    </div>
  </section>

  <!-- Connection overlay — screen-agnostic. Covers the phone whenever the relay
       link drops so the player isn't tapping a dead surface: "Reconnecting…" while
       PartyConnection retries, then "Connection lost" with a retry (and a nudge to
       the big screen's reconnect QR) once it gives up. Hidden on a clean (re)join. -->
  <div id="conn" class="conn hidden" role="alertdialog" aria-live="assertive">
    <div class="conn__card">
      <div id="conn-title" class="conn__title">Reconnecting…</div>
      <div id="conn-msg" class="conn__msg"></div>
      <button id="conn-retry" type="button" class="btn btn--brand hidden">Try again</button>
      <!-- Escape hatch for terminal states (display gone for good, seat taken
           over, retries exhausted) — without it the overlay is a dead end and
           only the back gesture gets you out. -->
      <button id="conn-leave" type="button" class="btn btn--ghost hidden">Exit to start</button>
    </div>
  </div>

  <!-- Latency chip — one-way (RTT/2), pinned bottom-right across all screens.
       Hidden until the first reading lands (post-join). The bolt shows only
       while the input/ping path is on the P2P fastlane DataChannel. -->
  <div id="latency" class="latency hidden" role="status" aria-live="off">
    <span class="latency__bolt" aria-hidden="true"></span><span class="latency__text">-- ms</span>
  </div>

  <script type="module" src="/controller/main.js?v=__APP_V__"></script>
</body>
</html>
